version: "3.9"
services:
  neo4j:
    image: neo4j:5
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      # Set a strong password before starting the stack.
      # Example: export NEO4J_AUTH="neo4j/YourStrongPassword"
      NEO4J_AUTH: "${NEO4J_AUTH}"
    volumes:
      - ./neo4j/data:/data

  mcp-server:
    build: .
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
    depends_on:
      - neo4j
